<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Challenge by Saúl</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #7f8c8d;
            font-style: italic;
            font-size: 1.1em;
        }

        .question-block {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            background-color: #fafbfc;
        }

        .question-text {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .option-item {
            margin-bottom: 10px;
        }

        .option-label {
            display: block;
            padding: 12px;
            background: white;
            border: 2px solid #e1e8ed;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-label:hover {
            border-color: #3498db;
            background-color: #f0f8ff;
        }

        input[type="radio"] {
            margin-right: 10px;
        }

        .feedback {
            display: none;
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.95em;
        }

        .feedback.correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback.incorrect {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .correct-label {
            border-color: #28a745 !important;
            background-color: #d4edda !important;
        }

        .incorrect-label {
            border-color: #dc3545 !important;
            background-color: #f8d7da !important;
        }

        button {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            font-weight: 600;
            color: white;
            background-color: #3498db;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
        }

        button:hover {
            background-color: #2980b9;
        }

        #retake-btn {
            background-color: #2ecc71;
            display: none;
        }

        #retake-btn:hover {
            background-color: #27ae60;
        }

        #results-area {
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏆 The Ultimate Grammar Challenge</h1>
        <div class="subtitle">Creado por Saúl para sus amigos 🚀</div>
    </header>

    <div id="quiz-container">
        </div>

    <div id="results-area"></div>
    
    <button id="submit-btn" onclick="checkAnswers()">Evaluar mis respuestas</button>
    <button id="retake-btn" onclick="resetQuiz()">¡Volver a intentarlo!</button>
</div>

<script>
    // Base de datos de preguntas
    const questions = [
        {
            q: "1. I usually __________ to work, but yesterday it was raining heavily, so I __________ the bus.",
            options: [
                { text: "walk / took", correct: true, feedback: "¡Correcto! Primero tienes un hábito general (Simple Present) y luego un evento que ya terminó ayer (Simple Past)." },
                { text: "am walking / take", correct: false, feedback: "Incorrecto. 'Usually' es para hábitos, no lleva progresivo (-ing). Además, tomar el autobús fue ayer (pasado)." },
                { text: "walk / was taking", correct: false, feedback: "Incorrecto. Tomar el autobús fue una acción rápida que finalizó, no un proceso continuo en el pasado." }
            ]
        },
        {
            q: "2. Look at the traffic! We __________ our flight for sure. I __________ the airline right now.",
            options: [
                { text: "will miss / am going to call", correct: false, feedback: "Incorrecto. Invertiste las reglas. Tienes evidencia visual frente a ti para la primera, y la segunda es espontánea." },
                { text: "are going to miss / will call", correct: true, feedback: "¡Perfecto! 'Going to' se usa cuando hay evidencia obvia (el tráfico), y 'will' para decisiones que tomas en ese instante." },
                { text: "are missing / will call", correct: false, feedback: "Incorrecto. El presente progresivo como futuro requiere que sea un plan agendado y seguro, no aplica para perder un vuelo por accidente." }
            ]
        },
        {
            q: "3. Hurry up and take your seat! The lights are dimming and the play __________.",
            options: [
                { text: "will start", correct: false, feedback: "Incorrecto. 'Will' se siente muy lejano. La acción está pasando casi en tus narices." },
                { text: "is starting", correct: false, feedback: "Casi, pero hay una expresión específica para algo que va a pasar en los próximos segundos." },
                { text: "is about to start", correct: true, feedback: "¡Exacto! 'Be about to' expresa inminencia, algo que va a ocurrir en cuestión de segundos o minutos." }
            ]
        },
        {
            q: "4. I am completely out of breath because I __________ for the last 45 minutes.",
            options: [
                { text: "had run", correct: false, feedback: "Incorrecto. El 'Past Perfect' se usaría si la persona dijera que *estaba* (was) sin aliento en el pasado." },
                { text: "have been running", correct: true, feedback: "¡Muy bien! Present Perfect Progressive: una acción continua en el pasado que te deja un resultado físico visible justo AHORA ('I am out of breath')." },
                { text: "was running", correct: false, feedback: "Incorrecto. Aunque fue continua, el progresivo pasado no conecta la acción con el resultado físico en tu presente actual." }
            ]
        },
        {
            q: "5. Yesterday, Jane was furious because her friend __________ up at the restaurant.",
            options: [
                { text: "didn't show", correct: false, feedback: "Incorrecto. Aunque se entiende, hay un tiempo verbal mejor para mostrar qué evento pasó PRIMERO en el pasado." },
                { text: "hasn't shown", correct: false, feedback: "Incorrecto. El Present Perfect no encaja porque toda la historia ocurrió ayer." },
                { text: "hadn't shown", correct: true, feedback: "¡Correcto! Past Perfect ('el pasado del pasado'). Primero su amigo no llegó, y por eso, después ella se puso furiosa." }
            ]
        }
    ];

    const quizContainer = document.getElementById('quiz-container');

    function renderQuiz() {
        quizContainer.innerHTML = '';
        questions.forEach((qObj, qIndex) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question-block';
            
            // Render question
            let html = `<div class="question-text">${qObj.q}</div>`;
            html += `<ul class="options-list">`;
            
            // Render options
            qObj.options.forEach((opt, oIndex) => {
                const inputId = `q${qIndex}_o${oIndex}`;
                html += `
                    <li class="option-item">
                        <label class="option-label" id="label_${inputId}" for="${inputId}">
                            <input type="radio" name="q${qIndex}" id="${inputId}" value="${oIndex}">
                            ${opt.text}
                        </label>
                    </li>
                `;
            });
            html += `</ul>`;
            
            // Render feedback area
            html += `<div class="feedback" id="feedback_${qIndex}"></div>`;
            
            questionDiv.innerHTML = html;
            quizContainer.appendChild(questionDiv);
        });
    }

    function checkAnswers() {
        let score = 0;
        let allAnswered = true;

        questions.forEach((qObj, qIndex) => {
            const selected = document.querySelector(`input[name="q${qIndex}"]:checked`);
            const feedbackDiv = document.getElementById(`feedback_${qIndex}`);
            
            // Limpiar estilos previos
            qObj.options.forEach((_, oIndex) => {
                document.getElementById(`label_q${qIndex}_o${oIndex}`).classList.remove('correct-label', 'incorrect-label');
            });

            if (!selected) {
                allAnswered = false;
                return;
            }

            const selectedValue = parseInt(selected.value);
            const isCorrect = qObj.options[selectedValue].correct;
            const selectedLabel = document.getElementById(`label_${selected.id}`);

            feedbackDiv.style.display = 'block';
            feedbackDiv.innerHTML = qObj.options[selectedValue].feedback;

            if (isCorrect) {
                score++;
                selectedLabel.classList.add('correct-label');
                feedbackDiv.className = 'feedback correct';
            } else {
                selectedLabel.classList.add('incorrect-label');
                feedbackDiv.className = 'feedback incorrect';
                
                // Resaltar también la respuesta correcta para que aprendan
                qObj.options.forEach((opt, oIndex) => {
                    if (opt.correct) {
                        document.getElementById(`label_q${qIndex}_o${oIndex}`).classList.add('correct-label');
                    }
                });
            }
        });

        if (!allAnswered) {
            alert("¡Eh! Te faltan preguntas por responder.");
            return;
        }

        // Mostrar resultados
        const resultsArea = document.getElementById('results-area');
        resultsArea.style.display = 'block';
        resultsArea.innerHTML = `Tu puntuación: ${score} / ${questions.length}`;
        
        // Cambiar botones
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('retake-btn').style.display = 'block';
        
        // Bloquear inputs para que no los cambien
        document.querySelectorAll('input[type="radio"]').forEach(radio => radio.disabled = true);
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetQuiz() {
        renderQuiz();
        document.getElementById('results-area').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('retake-btn').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Inicializar el quiz al cargar
    renderQuiz();
</script>

</body>
</html>
