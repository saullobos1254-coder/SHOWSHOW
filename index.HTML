<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Saúl & Yade | Temas + Animaciones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== SISTEMA DE TEMAS ===== */
        :root {
            /* TEMA NOCTURNO (DEFAULT) - Elegante y profundo */
            --bg-primary: #0A0C10;
            --bg-secondary: #121418;
            --bg-tertiary: #1C1F26;
            --bg-elevated: #252A33;
            --surface: #1A1D24;
            --surface-light: #2A2F3A;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-medium: rgba(255, 255, 255, 0.08);
            --border-bold: rgba(255, 255, 255, 0.12);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-tertiary: rgba(255, 255, 255, 0.45);
            --text-inverse: #0A0C10;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.6);
            --shadow-lg: 0 20px 40px -8px rgba(0, 0, 0, 0.8);
            --overlay: rgba(0, 0, 0, 0.5);
            --theme-transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F0F2F5;
            --bg-elevated: #E8ECF0;
            --surface: #FFFFFF;
